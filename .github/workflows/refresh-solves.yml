name: Refresh LeetCode solves

# Backstop for the on-visit accumulation: once a day, poll every tracked user's
# LeetCode feed and merge new solves into KV. This captures solves even when a
# user hasn't visited the site (bounded by "fewer than ~20 solves per day").
# The site itself still accumulates on every page visit, independent of this.
on:
  schedule:
    - cron: '0 0 * * *' # daily at 00:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Ping refresh endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          status=$(curl -sS -o response.json -w '%{http_code}' \
            -H "x-refresh-token: $REFRESH_TOKEN" \
            "$SITE_URL/api/leetcode/refresh")
          echo "HTTP $status"
          cat response.json || true
          echo
          [ "$status" = "200" ]
